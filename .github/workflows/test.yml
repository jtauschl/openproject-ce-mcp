name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Check package metadata
        run: uvx twine check dist/*

  launchers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Check get.sh syntax (POSIX sh)
        run: sh -n get.sh

      - name: Check uninstall.sh syntax (bash)
        run: bash -n uninstall.sh

      - name: Check get.ps1 / uninstall.ps1 syntax (PowerShell parser)
        shell: pwsh
        run: |
          $hadErrors = $false
          foreach ($f in @("get.ps1", "uninstall.ps1")) {
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($f, [ref]$null, [ref]$errors)
            if ($errors.Count -gt 0) {
              $errors | ForEach-Object { Write-Host "::error file=$f::$($_.Message)" }
              $hadErrors = $true
            }
          }
          if ($hadErrors) { exit 1 }

      - name: Run launcher tests
        run: uv run pytest -m launcher
